name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx biome format .

      - name: Lint
        run: npx oxlint . && npx biome check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx tsc && npx vite build

  backend-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet (root)
        run: go vet ./...

      - name: Go test (root)
        run: go test -race ./... -count=1

      - name: Go build (root)
        run: go build ./...

      - name: Go vet (backend)
        run: cd backend && go vet ./...

      - name: Go test (backend)
        run: cd backend && go test -race ./... -count=1

      - name: Go build (backend)
        run: cd backend && go build ./...

  backend-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask pytest

      - name: Python tests
        run: cd python && python -m pytest test_analyzer.py test_server.py -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # mobile-chrome プロジェクトは chromium エンジンを使うため、
      # chromium と firefox のブラウザをインストールすれば全プロジェクトを実行できる。
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # playwright.config.ts の webServer が Vite dev server (5173) を自動起動する。
      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
